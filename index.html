<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chrome Audio Stream</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<style>

body{
  font-family: Arial;
  text-align:center;
  max-width:700px;
  margin:auto;
  padding:40px;
}

button{
  padding:14px 20px;
  font-size:18px;
  margin:10px;
}

audio{
  width:100%;
  margin-top:20px;
}

#status{
  margin-top:20px;
  color:#555;
}

</style>
</head>

<body>

<h2>Chrome Audio Stream</h2>

<button id="broadcast">Start Broadcasting</button>
<button id="listen">Start Listening</button>

<div id="status"></div>

<audio id="audio" autoplay controls></audio>

<script>

const params = new URLSearchParams(location.search);
const streamId = params.get("listen") || "music";

let peer;
let localStream;

const audio = document.getElementById("audio");
const status = document.getElementById("status");

function log(msg){
  status.innerHTML = msg;
}


// BROADCAST

document.getElementById("broadcast").onclick = async ()=>{

  log("Starting broadcast...");

  localStream = await navigator.mediaDevices.getDisplayMedia({
    video:true,
    audio:true
  });

  peer = new Peer(streamId);

  peer.on("open", id=>{
    log("Broadcast ready. Listeners can connect.");
  });

  peer.on("call", call=>{
    call.answer(localStream);
  });

};


// LISTENER

document.getElementById("listen").onclick = ()=>{

  log("Connecting to broadcast...");

  peer = new Peer();

  peer.on("open", id=>{

    const call = peer.call(streamId, null);

    call.on("stream", remoteStream=>{
      audio.srcObject = remoteStream;
      log("Audio connected");
    });

  });

};

</script>

</body>
</html>
