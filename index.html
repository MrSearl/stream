<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chrome Audio Stream</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<style>

body{
  font-family:Arial;
  text-align:center;
  max-width:700px;
  margin:auto;
  padding:40px;
}

button{
  padding:14px 20px;
  font-size:18px;
  margin:10px;
}

#status{
  margin-top:20px;
  color:#555;
}

audio{
  width:100%;
  margin-top:20px;
}

</style>
</head>

<body>

<h2>Chrome Audio Stream</h2>

<button id="broadcast">Broadcast Audio</button>
<button id="listen">Listen</button>

<div id="status"></div>

<audio id="audio" autoplay controls></audio>

<script>

const STREAM_ID = "music";

let peer;
let localStream;

const status = document.getElementById("status");
const audio = document.getElementById("audio");

function log(msg){
  status.innerHTML = msg;
}


// BROADCAST

document.getElementById("broadcast").onclick = async ()=>{

  log("Preparing broadcast...");

  localStream = await navigator.mediaDevices.getDisplayMedia({
    video:true,
    audio:true
  });

  peer = new Peer(STREAM_ID);

  peer.on("open", ()=>{
    log("Broadcast live. Listeners can now connect.");
  });

  peer.on("call", call=>{
    log("Listener connected");
    call.answer(localStream);
  });

};



// LISTENER

document.getElementById("listen").onclick = ()=>{

  log("Connecting to broadcast...");

  peer = new Peer();

  peer.on("open", ()=>{

    const call = peer.call(STREAM_ID, new MediaStream());

    if(!call){
      log("Broadcaster not ready yet");
      return;
    }

    call.on("stream", stream=>{
      audio.srcObject = stream;
      log("Audio connected");
    });

  });

};

</script>

</body>
</html>
