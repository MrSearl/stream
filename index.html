<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chrome Audio Stream</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<style>

body{
  font-family:Arial;
  text-align:center;
  padding:40px;
  max-width:700px;
  margin:auto;
}

button{
  padding:14px 20px;
  font-size:18px;
  margin:10px;
}

#status{
  margin-top:20px;
  font-size:16px;
  color:#555;
}

audio{
  width:100%;
  margin-top:20px;
}

</style>

</head>

<body>

<h2>Chrome Audio Stream</h2>

<button id="broadcast">Start Broadcasting</button>
<button id="listen">Start Listening</button>

<div id="status"></div>

<audio id="audio" autoplay controls></audio>

<script>

const params = new URLSearchParams(location.search);

const peerId = params.get("listen") || "music";

let peer;

const status = document.getElementById("status");
const audio = document.getElementById("audio");

function log(msg){
  status.innerHTML = msg;
}

// BROADCAST

document.getElementById("broadcast").onclick = async ()=>{

  log("Starting broadcast...");

  peer = new Peer(peerId);

  const stream = await navigator.mediaDevices.getDisplayMedia({
    video:true,
    audio:true
  });

  peer.on("call", call=>{
    call.answer(stream);
  });

  log("Broadcasting.<br>Listeners open:<br><b>?listen="+peerId+"</b>");
};


// LISTENER

document.getElementById("listen").onclick = ()=>{

  log("Connecting to broadcast...");

  peer = new Peer();

  peer.on("open", id=>{

    const call = peer.call(peerId, new MediaStream());

    call.on("stream", remoteStream=>{
      audio.srcObject = remoteStream;
      log("Connected to broadcast");
    });

  });

};

</script>

</body>
</html>
